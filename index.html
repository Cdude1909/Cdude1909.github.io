    <style>
      :root {
        --bg-primary: #ffffff;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --accent-primary: #7c3aed;
        --accent-secondary: #4f46e5;
        --surface-glass: rgba(255, 255, 255, 0.7);
        --border-glass: rgba(0, 0, 0, 0.08);
      }

      html.dark {
        --bg-primary: #030303;
        --text-primary: #f9fafb;
        --text-secondary: #9ca3af;
        --accent-primary: #a78bfa;
        --accent-secondary: #818cf8;
        --surface-glass: rgba(10, 10, 15, 0.5);
        --border-glass: rgba(255, 255, 255, 0.1);
      }

      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
        transition: background-color 0.4s ease, color 0.4s ease;
      }

      /* Subtle Ambient Background */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: 
          radial-gradient(circle at 0% 0%, rgba(124, 58, 237, 0.03) 0%, transparent 40%),
          radial-gradient(circle at 100% 100%, rgba(79, 70, 229, 0.03) 0%, transparent 40%);
        z-index: -1;
        pointer-events: none;
      }

      .glass-card {
        background: var(--surface-glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-glass);
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      .glass-card:hover {
        border-color: var(--accent-primary);
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
        transform: translateY(-4px);
      }

      /* Clean Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-glass);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-primary);
      }

      /* Hide default cursor on desktop */
      @media (min-width: 1024px) {
        * {
          cursor: none !important;
        }
      }

      /* Custom Cursor */
      .cursor-dot,
      .cursor-outline {
          pointer-events: none;
          position: fixed;
          top: 0;
          left: 0;
          border-radius: 50%;
          z-index: 9999;
          opacity: 0;
          transition: opacity 0.3s ease;
      }
      .cursor-dot {
          width: 8px;
          height: 8px;
          background-color: var(--accent-primary);
          box-shadow: 0 0 15px var(--accent-primary);
          margin-left: -4px;
          margin-top: -4px;
      }
      .cursor-outline {
          width: 40px;
          height: 40px;
          border: 1px solid var(--accent-primary);
          background: transparent;
          margin-left: -20px;
          margin-top: -20px;
      }
      body:hover .cursor-dot,
      body:hover .cursor-outline {
          opacity: 1;
      }
      .cursor-active {
        opacity: 1 !important;
      }

      /* App Animations */
      @keyframes appReveal {
        from { opacity: 0; transform: translateY(10px); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      .app-reveal {
        animation: appReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .scroll-reveal {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .scroll-reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
